name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="v$(grep '^version =' Cargo.toml | head -n 1 | cut -d '"' -f 2)-dev"
          fi
          gh release create "$tag" \
            --title "$tag" \
            --draft \
            --generate-notes || echo "Release already exists"

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../arxiv2md-${{ matrix.target }}.tar.gz arxiv2md
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../arxiv2md-${{ matrix.target }}.zip arxiv2md.exe
      - name: Upload Release Asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
             tag="v$(grep '^version =' Cargo.toml | head -n 1 | cut -d '"' -f 2)-dev"
          fi
          if [ "${{ runner.os }}" == "Windows" ]; then
            gh release upload "$tag" arxiv2md-${{ matrix.target }}.zip --clobber
          else
            gh release upload "$tag" arxiv2md-${{ matrix.target }}.tar.gz --clobber
          fi
